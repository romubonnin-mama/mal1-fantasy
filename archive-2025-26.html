<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma L1 — Saison 2025/26 Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --surface: #111318; --surface2: #181c24;
    --border: rgba(255,255,255,0.06); --accent: #00e5a0; --accent2: #ff6b35;
    --gold: #f5c842; --silver: #b0b8c8; --bronze: #cd7f3a;
    --text: #e8eaf0; --muted: #6b7280; --danger: #ff4455;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,12,16,0.92); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 16px; display: flex; align-items: center; justify-content: space-between;
    height: 60px; gap: 12px;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 3px; color: var(--text); display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .logo span { color: var(--accent); }
  .logo-badge { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 3px; letter-spacing: 1px; }
  .nav-tabs { display: flex; gap: 4px; flex-shrink: 0; }
  .nav-tab { color: var(--muted); font-size: 12px; font-weight: 600; padding: 6px 10px; border-radius: 6px; cursor: pointer; transition: all 0.2s; border: none; background: none; text-decoration: none; display: inline-flex; align-items: center; font-family: 'DM Sans', sans-serif; }
  .nav-tab:hover { color: var(--text); background: var(--surface2); }
  .nav-tab.active { color: var(--accent); background: var(--surface2); }
  .nav-dropdown { position: relative; }
  .nav-dropdown-menu { display: none; position: absolute; top: calc(100% + 8px); right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 6px; min-width: 150px; z-index: 200; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  .nav-dropdown.open .nav-dropdown-menu { display: block; }
  .nav-dropdown-menu a { display: block; padding: 8px 12px; color: var(--muted); font-size: 12px; font-weight: 600; border-radius: 6px; text-decoration: none; transition: all 0.15s; }
  .nav-dropdown-menu a:hover { color: var(--text); background: var(--surface2); }
  @media(max-width: 599px) {
    header { height: auto; min-height: 50px; padding: 8px 12px; flex-wrap: wrap; gap: 6px; }
    .nav-tabs { order: 3; width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; padding-bottom: 2px; }
    .nav-tab { text-align: center; padding: 7px 4px; font-size: 10px; background: var(--surface2); border-radius: 6px; }
  }

  .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

  .hero {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; margin-bottom: 20px;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(245,200,66,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; line-height: 1; margin-bottom: 4px; }
  .hero h1 em { color: var(--gold); font-style: normal; }
  .hero p { color: var(--muted); font-size: 12px; margin-bottom: 16px; }
  .hero-stats { display: flex; gap: 24px; flex-wrap: wrap; }
  .hero-stat .val { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--gold); line-height: 1; }
  .hero-stat .lbl { color: var(--muted); font-size: 10px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
  .divider-v { width: 1px; height: 36px; background: var(--border); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 16px; }
  .card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .card-title::before { content: ''; display: block; width: 3px; height: 14px; background: var(--gold); border-radius: 2px; }

  /* Podium */
  .podium { display: flex; gap: 12px; padding: 24px 18px 0; justify-content: center; align-items: flex-end; }
  .podium-item { flex: 1; max-width: 200px; text-align: center; }
  .podium-item.first { order: 2; }
  .podium-item.second { order: 1; }
  .podium-item.third { order: 3; }
  .podium-block {
    border-radius: 10px 10px 0 0;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    padding: 16px 12px 14px;
  }
  .first .podium-block { background: linear-gradient(180deg, rgba(245,200,66,0.15) 0%, rgba(245,200,66,0.04) 100%); border: 1px solid rgba(245,200,66,0.2); border-bottom: none; min-height: 130px; }
  .second .podium-block { background: linear-gradient(180deg, rgba(176,184,200,0.10) 0%, rgba(176,184,200,0.03) 100%); border: 1px solid rgba(176,184,200,0.15); border-bottom: none; min-height: 95px; }
  .third .podium-block { background: linear-gradient(180deg, rgba(205,127,58,0.10) 0%, rgba(205,127,58,0.03) 100%); border: 1px solid rgba(205,127,58,0.15); border-bottom: none; min-height: 72px; }
  .podium-medal { font-size: 26px; margin-bottom: 8px; }
  .podium-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; letter-spacing: 1px; }
  .first .podium-name { color: var(--gold); font-size: 22px; }
  .second .podium-name { color: var(--silver); font-size: 18px; }
  .third .podium-name { color: var(--bronze); font-size: 16px; }
  .podium-pts { font-family: 'Bebas Neue', sans-serif; line-height: 1; margin-top: 4px; }
  .first .podium-pts { color: var(--gold); font-size: 34px; }
  .second .podium-pts { color: var(--silver); font-size: 26px; }
  .third .podium-pts { color: var(--bronze); font-size: 22px; }
  .podium-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .podium-footer { height: 16px; }

  /* Classement table */
  .cl-table { width: 100%; border-collapse: collapse; }
  .cl-table th { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; padding: 8px 18px; text-align: right; border-bottom: 1px solid var(--border); }
  .cl-table th:nth-child(1) { width: 44px; text-align: center; }
  .cl-table th:nth-child(2) { text-align: left; }
  .cl-table td { padding: 12px 18px; border-bottom: 1px solid rgba(255,255,255,0.03); text-align: right; font-size: 13px; vertical-align: middle; }
  .cl-table tr:last-child td { border-bottom: none; }
  .cl-table td:nth-child(1) { text-align: center; }
  .cl-table td:nth-child(2) { text-align: left; font-weight: 600; }
  .cl-table tr.top1 { background: linear-gradient(90deg, rgba(245,200,66,0.05) 0%, transparent 80%); }
  .cl-table tr.top2 { background: linear-gradient(90deg, rgba(176,184,200,0.04) 0%, transparent 80%); }
  .cl-table tr.top3 { background: linear-gradient(90deg, rgba(205,127,58,0.04) 0%, transparent 80%); }
  .rank-num { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--muted); }
  .top1 .rank-num { color: var(--gold); }
  .top2 .rank-num { color: var(--silver); }
  .top3 .rank-num { color: var(--bronze); }
  .pts-total { font-family: 'Bebas Neue', sans-serif; font-size: 20px; }
  .pts-avg { color: var(--muted); }
  .pts-max { color: var(--accent); font-weight: 600; }
  .pts-min { color: var(--danger); font-weight: 600; }
  .j-hint { color: var(--muted); font-size: 9px; margin-left: 3px; }

  /* Records */
  .records-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
  .record-item { padding: 18px 16px; text-align: center; border-right: 1px solid var(--border); }
  .record-item:last-child { border-right: none; }
  .record-val { font-family: 'Bebas Neue', sans-serif; font-size: 34px; line-height: 1; }
  .record-val.gold { color: var(--gold); }
  .record-val.red { color: var(--danger); }
  .record-val.green { color: var(--accent); }
  .record-val.orange { color: var(--accent2); }
  .record-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; }
  .record-sub { font-size: 11px; font-weight: 600; margin-top: 5px; }

  /* Stats par manager */
  .mgr-stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 16px 18px; }
  .mgr-stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
  .mgr-stat-name { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 1px; margin-bottom: 10px; }
  .mgr-stat-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; margin-bottom: 5px; }
  .mgr-stat-row:last-child { margin-bottom: 0; }
  .mgr-stat-row .label { color: var(--muted); }
  .mgr-stat-row .value { font-family: 'Bebas Neue', sans-serif; font-size: 16px; }
  .mgr-stat-row .value.green { color: var(--accent); }
  .mgr-stat-row .value.red { color: var(--danger); }

  @media (max-width: 599px) {
    .container { padding: 14px 10px; }
    .hero { padding: 16px; }
    .hero h1 { font-size: 26px; }
    .records-grid { grid-template-columns: repeat(2, 1fr); }
    .record-item:nth-child(2) { border-right: none; }
    .record-item:nth-child(3) { border-right: 1px solid var(--border); border-top: 1px solid var(--border); }
    .record-item:nth-child(4) { border-right: none; border-top: 1px solid var(--border); }
    .mgr-stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .hide-mob { display: none; }
    .podium-item.first .podium-pts { font-size: 26px; }
    .podium-item.second .podium-pts { font-size: 20px; }
    .podium-item.third .podium-pts { font-size: 18px; }
  }
  @media (max-width: 400px) {
    .mgr-stats-grid { grid-template-columns: 1fr 1fr; }
    .podium { gap: 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">MA <span>L1</span><span class="logo-badge">ARCHIVE</span></div>
  <div class="nav-tabs">
    <a class="nav-tab" href="index.html">Classement</a>
    <a class="nav-tab" href="index.html">Journées</a>
    <a class="nav-tab" href="index.html">Joueurs</a>
    <a class="nav-tab" href="index.html">Stats</a>
    <a class="nav-tab" href="enchere.html">Enchères</a>
    <div class="nav-dropdown">
      <button class="nav-tab active" onclick="this.closest('.nav-dropdown').classList.toggle('open')">Archives ▾</button>
      <div class="nav-dropdown-menu">
        <a href="archive-2025-26.html" style="color:var(--accent)">Saison 2025/26</a>
      </div>
    </div>
  </div>
</header>

<div class="container">

  <div class="hero">
    <h1>SAISON <em>2025</em>/26</h1>
    <p>Archive · 9 participants · <span id="nb-journees">—</span> journées</p>
    <div class="hero-stats">
      <div class="hero-stat"><div class="val" id="stat-champion">—</div><div class="lbl">Champion</div></div>
      <div class="divider-v"></div>
      <div class="hero-stat"><div class="val" id="stat-total">—</div><div class="lbl">Pts du vainqueur</div></div>
      <div class="divider-v"></div>
      <div class="hero-stat"><div class="val" id="stat-ecart">—</div><div class="lbl">Écart 1<sup>er</sup>/2<sup>e</sup></div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">Podium</div>
      <span style="font-size:11px;color:var(--muted)">Saison 2025/26</span>
    </div>
    <div class="podium" id="podium"></div>
    <div class="podium-footer"></div>
  </div>

  <div class="card">
    <div class="card-header"><div class="card-title">Classement final</div></div>
    <table class="cl-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Manager</th>
          <th>Total</th>
          <th class="hide-mob">Moy/J</th>
          <th>Meilleure J</th>
          <th class="hide-mob">Pire J</th>
        </tr>
      </thead>
      <tbody id="classement-body"></tbody>
    </table>
  </div>

  <div class="card">
    <div class="card-header"><div class="card-title">Records de la saison</div></div>
    <div class="records-grid" id="records-grid"></div>
  </div>

  <div class="card">
    <div class="card-header"><div class="card-title">Stats par manager</div></div>
    <div class="mgr-stats-grid" id="mgr-stats-grid"></div>
  </div>

</div>

<script>
fetch('data-archive-2025-26.json')
  .then(r => r.json())
  .then(render)
  .catch(() => {
    document.querySelector('.container').innerHTML =
      '<p style="color:var(--muted);padding:60px;text-align:center;font-size:14px">Données non disponibles.</p>';
  });

function render(data) {
  const cl = data.classement;
  const hist = data.historique;
  const nbJ = data.derniere_journee;
  const medals = ['🥇','🥈','🥉'];
  const rowCls = ['top1','top2','top3'];

  document.getElementById('nb-journees').textContent = nbJ;
  document.getElementById('stat-champion').textContent = cl[0].nom;
  document.getElementById('stat-total').textContent = cl[0].pts;
  document.getElementById('stat-ecart').textContent = cl[0].pts - cl[1].pts;

  const stats = {};
  for (const m of cl) {
    const scores = [];
    for (let j = 1; j <= nbJ; j++) {
      const s = hist[String(j)]?.[m.nom];
      if (s !== undefined && s !== null) scores.push({ j, s });
    }
    const vals = scores.map(x => x.s);
    const maxVal = vals.length ? Math.max(...vals) : 0;
    const minVal = vals.length ? Math.min(...vals) : 0;
    stats[m.nom] = {
      total: m.pts,
      avg: vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : '—',
      max: maxVal,
      maxJ: vals.length ? scores.find(x => x.s === maxVal).j : 0,
      min: minVal,
      minJ: vals.length ? scores.find(x => x.s === minVal).j : 0,
    };
  }

  // Podium
  const podiumItem = (m, cls, medal) => `
    <div class="podium-item ${cls}">
      <div class="podium-block">
        <div class="podium-medal">${medal}</div>
        <div class="podium-name">${m.nom}</div>
        <div class="podium-pts">${m.pts}</div>
        <div class="podium-lbl">points</div>
      </div>
    </div>`;
  document.getElementById('podium').innerHTML =
    podiumItem(cl[1], 'second', '🥈') +
    podiumItem(cl[0], 'first', '🏆') +
    podiumItem(cl[2], 'third', '🥉');

  // Classement table
  let tbody = '';
  for (const m of cl) {
    const s = stats[m.nom];
    const i = m.rang - 1;
    const cls = rowCls[i] || '';
    tbody += `<tr class="${cls}">
      <td><span class="rank-num">${m.rang}</span></td>
      <td>${i < 3 ? medals[i] + ' ' : ''}${m.nom}</td>
      <td><span class="pts-total">${s.total}</span></td>
      <td class="hide-mob pts-avg">${s.avg}</td>
      <td class="pts-max">${s.max}<span class="j-hint">J${s.maxJ}</span></td>
      <td class="hide-mob pts-min">${s.min}<span class="j-hint">J${s.minJ}</span></td>
    </tr>`;
  }
  document.getElementById('classement-body').innerHTML = tbody;

  // Records
  let bestScore = { val: 0, manager: '', j: 0 };
  let worstScore = { val: Infinity, manager: '', j: 0 };
  for (let j = 1; j <= nbJ; j++) {
    const jData = hist[String(j)];
    if (!jData) continue;
    for (const [mgr, s] of Object.entries(jData)) {
      if (s > bestScore.val) bestScore = { val: s, manager: mgr, j };
      if (s < worstScore.val) worstScore = { val: s, manager: mgr, j };
    }
  }
  const bestAvg = cl.reduce((best, m) => {
    const avg = parseFloat(stats[m.nom].avg);
    return avg > (best.avg || 0) ? { nom: m.nom, avg } : best;
  }, {});
  const ecart12 = cl[0].pts - cl[1].pts;

  document.getElementById('records-grid').innerHTML = `
    <div class="record-item">
      <div class="record-val gold">${bestScore.val}</div>
      <div class="record-label">Meilleur score</div>
      <div class="record-sub">${bestScore.manager} · J${bestScore.j}</div>
    </div>
    <div class="record-item">
      <div class="record-val red">${worstScore.val === Infinity ? '—' : worstScore.val}</div>
      <div class="record-label">Pire score</div>
      <div class="record-sub">${worstScore.manager} · J${worstScore.j}</div>
    </div>
    <div class="record-item">
      <div class="record-val green">${bestAvg.avg}</div>
      <div class="record-label">Meilleure moyenne</div>
      <div class="record-sub">${bestAvg.nom}</div>
    </div>
    <div class="record-item">
      <div class="record-val orange">${ecart12}</div>
      <div class="record-label">Écart 1<sup>er</sup>/2<sup>e</sup></div>
      <div class="record-sub">${cl[0].nom} / ${cl[1].nom}</div>
    </div>`;

  // Stats par manager (same order as classement)
  let mgr = '';
  for (const m of cl) {
    const s = stats[m.nom];
    const i = m.rang - 1;
    const nameColor = i === 0 ? 'var(--gold)' : i === 1 ? 'var(--silver)' : i === 2 ? 'var(--bronze)' : 'var(--text)';
    mgr += `<div class="mgr-stat-card">
      <div class="mgr-stat-name" style="color:${nameColor}">${i < 3 ? medals[i] + ' ' : ''}${m.nom}</div>
      <div class="mgr-stat-row"><span class="label">Total</span><span class="value">${s.total}</span></div>
      <div class="mgr-stat-row"><span class="label">Moyenne</span><span class="value">${s.avg}</span></div>
      <div class="mgr-stat-row"><span class="label">Meilleur</span><span class="value green">${s.max} <small style="color:var(--muted);font-size:10px">J${s.maxJ}</small></span></div>
      <div class="mgr-stat-row"><span class="label">Pire</span><span class="value red">${s.min} <small style="color:var(--muted);font-size:10px">J${s.minJ}</small></span></div>
    </div>`;
  }
  document.getElementById('mgr-stats-grid').innerHTML = mgr;
}
</script>
</body>
</html>
